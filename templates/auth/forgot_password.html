<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset password · SSIES</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Satoshi',sans-serif;background:#F4F6FB;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:16px;padding:32px;width:400px;max-width:100%;box-shadow:0 18px 50px rgba(16,24,40,.12);}
  h1{font-size:22px;margin-bottom:8px;} p{color:#667085;font-size:14px;margin-bottom:20px;}
  input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:12px;font-size:15px;}
  button{width:100%;padding:14px;background:#0000EE;color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;}
  .msg{font-size:13px;margin-top:12px;color:#099268;} .err{color:#D92D20;font-size:13px;margin-bottom:12px;}
  a{color:#0000EE;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
  <h1>Reset password</h1>
  <p>Enter your email and we'll send a reset link.</p>
  <div class="err" id="err"></div>
  <input id="email" type="email" placeholder="you@example.com"/>
  <button onclick="reset()">Send reset link</button>
  <div class="msg" id="msg"></div>
  <p style="margin-top:16px"><a href="/login">← Back to sign in</a></p>
</div>
<script>
const sb = window.supabase.createClient({{ supabase_url|tojson }}, {{ supabase_anon_key|tojson }});
async function reset(){
  document.getElementById("err").textContent = "";
  document.getElementById("msg").textContent = "";
  const email = document.getElementById("email").value.trim();
  if(!email){ document.getElementById("err").textContent = "Email required"; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + "/login" });
  if(error){ document.getElementById("err").textContent = error.message; return; }
  document.getElementById("msg").textContent = "Check your email for the reset link.";
}
</script>
</body>
</html>
