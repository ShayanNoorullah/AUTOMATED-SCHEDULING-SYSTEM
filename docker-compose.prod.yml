# Production stack: Flask + WAHA + Caddy (HTTPS via DuckDNS)
# Usage: cp .env.production.example .env && docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DOCKER: "1"
      USE_WAITRESS: "1"
      FORCE_HTTPS: "1"
      PORT: "5000"
      WAHA_BASE_URL: http://waha:3000
    depends_on:
      waha:
        condition: service_started
    networks:
      - ssies

  waha:
    # Oracle Ampere (ARM64): use :arm — :latest is amd64-only
    image: devlikeapro/waha:arm
    restart: unless-stopped
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_PRINT_QR: "False"
    volumes:
      - waha-sessions:/app/.sessions
    networks:
      - ssies
    # Port 3000 is NOT published — only reachable from app container

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DUCKDNS_DOMAIN: ${DUCKDNS_DOMAIN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - ssies

volumes:
  waha-sessions:
  caddy_data:
  caddy_config:

networks:
  ssies:
    driver: bridge
